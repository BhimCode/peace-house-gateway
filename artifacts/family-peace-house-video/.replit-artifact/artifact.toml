kind = "video"
previewPath = "/family-peace-house-video/"
title = "Family Peace House Promo Video"
version = "1.0.0"
id = "artifacts/family-peace-house-video"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/family-peace-house-video/" ]
localPort = 22511

[services.development]
run = "pnpm --filter @workspace/family-peace-house-video run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/family-peace-house-video", "run", "build" ]
publicDir = "artifacts/family-peace-house-video/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22511"
BASE_PATH = "/family-peace-house-video/"

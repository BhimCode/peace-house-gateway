kind = "mobile"
previewPath = "/mobile/"
title = "Family Peace House Mobile"
version = "1.0.0"
id = "artifacts/family-peace-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 19430

[services.development]
run = "pnpm --filter @workspace/family-peace-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/family-peace-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/family-peace-mobile", "run", "serve" ]

[services.env]
PORT = "19430"
BASE_PATH = "/mobile/"

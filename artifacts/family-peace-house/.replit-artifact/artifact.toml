kind = "web"
previewPath = "/"
title = "Family Peace House"
version = "1.0.0"
id = "artifacts/family-peace-house"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23304

[services.development]
run = "pnpm --filter @workspace/family-peace-house run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/family-peace-house", "run", "build" ]
publicDir = "artifacts/family-peace-house/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23304"
BASE_PATH = "/"
